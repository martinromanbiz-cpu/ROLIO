<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLIO | Kontakt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #2563eb, #16a34a, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <section class="py-20 px-6 max-w-7xl mx-auto text-center relative overflow-hidden rounded-3xl mb-12" style="background-image: url('path/to/r_logo_3d_enhancement.png'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-black/60 blur-sm"></div>
        <div class="relative z-10 p-10 bg-white/70 backdrop-blur-lg rounded-xl">
            <h1 class="text-6xl font-black mb-6 leading-tight">Kontaktujte <span class="gradient-text">Nás</span></h1>
            <p class="text-xl text-slate-700 max-w-2xl mx-auto mb-10">Máte dotazy, nebo chcete rovnou zkusit svou novou roli? Pošlete nám e-mail a my se ozveme.</p>
        </div>
    </section>

    <section class="py-20 px-6 max-w-7xl mx-auto text-center">
        <div class="p-10 bg-white shadow-xl rounded-3xl border border-slate-100">
            <h2 class="text-3xl font-bold mb-6">Chci <span class="text-orange-500">zkusit</span></h2>
            <p class="text-slate-600 mb-8">Napište nám na náš e-mail a do předmětu dejte "ROLIO - Žádost".</p>
            <a href="mailto:rolio.jobs@gmail.com?subject=ROLIO - Žádost&body=Dobrý den, mám zájem o zkušenost..." class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition transform hover:scale-105 shadow-xl">Poslat mail pro zkušenost</a>
        </div>
    </section>

    </body>
</html>
